<!--link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet"-->

<style>
/* ===== GLOBAL ===== */
body {
  font-family: 'Source Sans Pro', sans-serif;
  background: #1b1f24;
  color: #ddd;
  margin: 0;
}

.admin-container {
  max-width: 1100px;
  margin: 40px auto;
  border: 3px solid #000;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
  background: #1b1f24;
}

/* ===== HEADER ===== */
.admin-header {
  background: linear-gradient(180deg, #3b75c3, #2858a8);
  padding: 16px 20px;
  font-weight: 700;
  text-transform: uppercase;
}

/* ===== TABS ===== */
.tabs {
  display: flex;
  border-bottom: 1px solid #333;
}

.tabs button {
  flex: 1;
  padding: 14px;
  background: #232933;
  border: none;
  color: #aaa;
  cursor: pointer;
  font-weight: 600;
}

.tabs button.active {
  background: #2858a8;
  color: #fff;
}

/* ===== CONTENT ===== */
.tab-content {
  display: none;
  padding: 20px;
}

.tab-content.active {
  display: block;
}

/* ===== FORMS ===== */
input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  margin-bottom: 16px;
  background: #0f1316;
  border: none;
  color: #fff;
  border-radius: 6px;
}

label {
  font-weight: 600;
}

/* ===== BUTTON ===== */
.btn {
  background: linear-gradient(180deg, #3b75c3, #2858a8);
  border: none;
  padding: 12px 18px;
  color: #fff;
  cursor: pointer;
  font-weight: 700;
  border-radius: 6px;
}

.btn:hover {
  opacity: 0.9;
}

/* ===== TABLE ===== */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #333;
  text-align: left;
}

th {
  color: #9fc0ff;
}

.msg-user { color: #9fc0ff; }
.msg-assistant { color: #9fffc1; }

/* ===== INFO BOX ===== */
.info-box {
  background: #232933;
  padding: 16px;
  border-left: 3px solid #3b75c3;
  border-radius: 6px;
}

.status-loading { color: #9fc0ff; }
.status-success { color: #9fffc1; }
.status-empty { color: #ffb84d; }
.status-error { color: #ff6b6b; }


/* SESSION META */
.session-meta {
  background: #232933;
  padding: 16px;
  border-left: 3px solid #3b75c3;
  border-radius: 6px;
  margin-top: 20px;
}

.session-meta-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.session-meta strong {
  color: #9fc0ff;
}

</style>


<div class="admin-container">
  <div class="admin-header">Chatbot Admin</div>

  <div class="tabs">
    <button class="active" data-tab="general">General</button>
    <button data-tab="history">Chat History</button>
	<button data-tab="order-suggestions">Order Suggestions</button>
    <button data-tab="info">Info</button>
  </div>

  <!-- GENERAL -->
  <div id="general" class="tab-content active">
    <h2>Settings</h2>
    <form id="settingsForm">
      <label style="display:flex; justify-content:space-between; align-items:center;">
		<span>LLM Model</span>

		<button type="button" class="btn" id="fetchModelsBtn">
			Fetch Models
		</button>
	  </label>
      <select id="model">
        <option>gpt-4o</option>
        <option>gpt-4.1</option>
      </select>
	  
	  <div id="modelStatus"></div>

      <label>System Prompt</label>
      <textarea id="systemPrompt" rows="6"></textarea>

      <button class="btn">Save</button>
    </form>
  </div>

  <!-- HISTORY -->
  <div id="history" class="tab-content">
    <h2>Chat History</h2>

    <form id="sessionSearchForm">
      <label>From</label>
      <input type="date" id="dateFrom">

      <label>To</label>
      <input type="date" id="dateTo">

      <button class="btn">Load Sessions</button>
    </form>

    <label>
      Session <span id="sessionStatus"></span>
    </label>

    <select id="sessionSelect">
      <option value="">-- Select Session --</option>
    </select>

    <button class="btn" id="loadSessionBtn">Load Chat</button>

    <!-- SESSION META -->
    <div id="sessionMeta" style="display:none;"></div>

    <!-- TABLE -->
    <table>
      <thead>
        <tr>
          <th>Message</th>
          <th>Role</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody id="historyTable"></tbody>
    </table>
  </div>
  
  <!-- ORDER SUGGESTIONS -->
	<div id="order-suggestions" class="tab-content">
	  <h2>Order Suggestions</h2>

	  <label>Select Suggestion</label>
	  <select id="suggestionSelect">
		<option value="">-- Select Suggestion --</option>
	  </select>

	  <button class="btn" id="loadSuggestionBtn">Load Suggestion</button>
	  <div id="suggestionStatus"></div>

	  <div id="suggestionDetails" style="display:none; margin-top:20px;"></div>
	</div>

  <!-- INFO -->
  <div id="info" class="tab-content">
    <h2>Info</h2>
    <div class="session-meta">
      AI Chatbot powered by Linovy for Gravi-Tec
    </div>
  </div>

</div>

<script>
let isLocalUrlForChatbotUsed = false;

const BASE_URL = isLocalUrlForChatbotUsed
  ? "http://localhost:8000"
  : "https://avahai.gravi-tec.de";

const MODEL_API = `${BASE_URL}/agent/available-models`;
const SETTINGS_API = `${BASE_URL}/agent/settings?code=gravitec`;
const SESSION_LIST_API = `${BASE_URL}/api/v1/sessions/ids-by-date`;
const SESSION_LOAD_API = `${BASE_URL}/api/v1/sessions/g`;
const ORDER_SUGGESTIONS_API = `${BASE_URL}/api/v1/order-suggestions`;

/* =========================
   BOOTSTRAP (WP SAFE)
========================= */

(function () {
  function init() {
    if (window.__ADMIN_INIT__) return;
    window.__ADMIN_INIT__ = true;

    console.log("Chatbot Admin UI initialized");

    initTabs();
    bindForms();
    loadModels().then(loadSettings);
  }

  function initTabs() {
    document.querySelectorAll(".tabs button").forEach(btn => {
      btn.addEventListener("click", () => {
        const tabId = btn.dataset.tab;
        const tabContent = document.getElementById(tabId);
        if (!tabContent) return;

        document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));

        btn.classList.add("active");
        tabContent.classList.add("active");

        if (tabId === "order-suggestions") {
          initOrderSuggestionsTab();
        }
      });
    });
  }

  function bindForms() {
    document.getElementById("fetchModelsBtn").onclick = async function () {
      const select = document.getElementById("model");
      const prev = select.value;

      await loadModels();

      if ([...select.options].some(o => o.value === prev)) {
        select.value = prev;
      }
    };

    document.getElementById("settingsForm").onsubmit = async function (e) {
      e.preventDefault();

      const payload = {
        model_name: document.getElementById("model").value,
        system_prompt: document.getElementById("systemPrompt").value
      };

      try {
        const res = await fetch(SETTINGS_API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error("Save failed");

        alert("Settings saved ✔");
      } catch (err) {
        console.error(err);
        alert("Error saving settings");
      }
    };

    document.getElementById("sessionSearchForm").onsubmit = loadSessions;
    document.getElementById("loadSessionBtn").onclick = loadSession;
  }

  function boot() {
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init(); // 🔥 CRITICAL for wp-admin
    }
  }

  boot();
})();

/* =========================
   GLOBAL HELPERS (WP SAFE)
========================= */

window.deleteSuggestion = async function (id) {
  if (!confirm(`Delete suggestion ${id}?`)) return;

  try {
    const res = await fetch(`${ORDER_SUGGESTIONS_API}/d/${encodeURIComponent(id)}`, {
      method: "DELETE"
    });

    if (res.ok) {
      alert("Suggestion deleted");
      document.getElementById("suggestionDetails").style.display = "none";
      loadSuggestionList();
    } else {
      alert("Delete failed");
    }
  } catch (err) {
    console.error(err);
    alert("Error deleting suggestion");
  }
};

/* =========================
   SESSIONS
========================= */

async function loadSessions(e) {
  e.preventDefault();

  const status = document.getElementById("sessionStatus");
  const select = document.getElementById("sessionSelect");

  const fromRaw = document.getElementById("dateFrom").value;
  const toRaw = document.getElementById("dateTo").value;

  function toDDMMYYYY(dateStr) {
    if (!dateStr) return "";
    const [y, m, d] = dateStr.split("-");
    return `${d}${m}${y}`;
  }

  const from_time = toDDMMYYYY(fromRaw);
  const to_time = toDDMMYYYY(toRaw);

  status.textContent = "Loading...";
  status.className = "status-loading";

  try {
    const res = await fetch(
      `${SESSION_LIST_API}?from_time=${encodeURIComponent(from_time)}&to_time=${encodeURIComponent(to_time)}`
    );

    if (!res.ok) throw new Error("Failed");

    const sessions = await res.json();

    select.innerHTML = '<option value="">-- Select Session --</option>';

    for (const id of sessions) {
      const opt = document.createElement("option");
      opt.value = id;
      opt.textContent = id;
      select.appendChild(opt);
    }

    status.textContent = sessions.length ? "✓" : "No sessions";
    status.className = sessions.length ? "status-success" : "status-empty";
  } catch (err) {
    console.error(err);
    status.textContent = "Error";
    status.className = "status-error";
  }
}

async function loadSession() {
  const id = document.getElementById("sessionSelect").value;
  if (!id) return alert("Select session");

  const tbody = document.getElementById("historyTable");
  tbody.innerHTML = "";

  try {
    const res = await fetch(`${SESSION_LOAD_API}/${encodeURIComponent(id)}`);
    if (!res.ok) throw new Error("Failed");

    const json = await res.json();

    renderMeta(json);
    renderMessages(json.data?.messages || []);
  } catch (err) {
    console.error(err);
    alert("Failed to load session");
  }
}

/* =========================
   META + MESSAGES
========================= */

function renderMeta(json) {
  const meta = document.getElementById("sessionMeta");
  meta.style.display = "block";
  meta.innerHTML = "";

  const box = document.createElement("div");
  box.className = "session-meta";

  const grid = document.createElement("div");
  grid.className = "session-meta-grid";

  function add(label, value) {
    const div = document.createElement("div");

    const strong = document.createElement("strong");
    strong.textContent = label + ":";

    div.appendChild(strong);
    div.appendChild(document.createElement("br"));
    div.appendChild(document.createTextNode(value));

    grid.appendChild(div);
  }

  const k = json.data.kunde || {};
  const b = json.data.ban_info || {};
  const orders = json.data.bestellungen || [];

  add("Session", json.session_id);
  add("Messages", json.message_count);
  add("Email", k.email || "-");
  add("Kundennr", k.kundennummer || "-");
  add("Banned", b.is_banned ? "Yes" : "No");

  box.appendChild(grid);
  meta.appendChild(box);
}

function renderMessages(messages) {
  const tbody = document.getElementById("historyTable");
  tbody.innerHTML = "";

  if (!messages.length) {
    const row = document.createElement("tr");
    const td = document.createElement("td");
    td.colSpan = 3;
    td.textContent = "No messages";
    row.appendChild(td);
    tbody.appendChild(row);
    return;
  }

  for (const m of messages) {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${m.content || m.text || ""}</td>
      <td>${m.role || "-"}</td>
      <td>${formatTimestamp(m.timestamp)}</td>
    `;

    tbody.appendChild(row);
  }
}

function formatTimestamp(ms) {
  if (!ms) return "";
  const d = new Date(ms);

  const pad = n => n.toString().padStart(2, "0");

  return `${pad(d.getDate())}.${pad(d.getMonth() + 1)}.${d.getFullYear()} ${pad(
    d.getHours()
  )}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

/* =========================
   MODELS + SETTINGS
========================= */

async function loadModels(selectedModel = null) {
  const select = document.getElementById("model");
  const status = document.getElementById("modelStatus");

  status.textContent = "Loading...";
  status.className = "status-loading";

  try {
    const res = await fetch(MODEL_API);
    const data = await res.json();

    const models = data.models || [];

    select.innerHTML = "";

    for (const m of models) {
      const opt = document.createElement("option");
      opt.value = m;
      opt.textContent = m;
      select.appendChild(opt);
    }

    if (selectedModel) select.value = selectedModel;

    status.textContent = "Loaded ✓";
    status.className = "status-success";
  } catch (err) {
    console.error(err);
    status.textContent = "Error";
    status.className = "status-error";
  }
}

async function loadSettings() {
  try {
    const res = await fetch(SETTINGS_API);
    const data = await res.json();

    await loadModels(data.model_name);
    document.getElementById("systemPrompt").value = data.system_prompt || "";
  } catch (err) {
    console.error(err);
  }
}

/* =========================
   ORDER SUGGESTIONS
========================= */

async function initOrderSuggestionsTab() {
  const select = document.getElementById("suggestionSelect");
  const btn = document.getElementById("loadSuggestionBtn");
  const status = document.getElementById("suggestionStatus");
  const details = document.getElementById("suggestionDetails");

  await loadSuggestionList();

  btn.onclick = async () => {
    const id = select.value;
    if (!id) return;

    status.textContent = "Loading...";
    details.style.display = "none";

    try {
      const res = await fetch(`${ORDER_SUGGESTIONS_API}/g/${encodeURIComponent(id)}/price`);
      const data = await res.json();

      renderSuggestionDetails(data);

      status.textContent = "Loaded ✓";
    } catch (err) {
      console.error(err);
      status.textContent = "Error";
    }
  };
}

async function loadSuggestionList() {
  const select = document.getElementById("suggestionSelect");

  const res = await fetch(`${ORDER_SUGGESTIONS_API}/all/descriptions`);
  const data = await res.json();

  select.innerHTML = '<option value="">-- Select --</option>';

  for (const [id, desc] of Object.entries(data)) {
    const opt = document.createElement("option");
    opt.value = id;
    opt.textContent = `${id} — ${desc}`;
    select.appendChild(opt);
  }
}

function renderSuggestionDetails(data) {
  const el = document.getElementById("suggestionDetails");
  el.style.display = "block";

  el.innerHTML = `
    <div class="info-box">
      <h3>${data.description}</h3>
      <p><strong>ID:</strong> ${data.suggestion_id}</p>
      <p><strong>Total:</strong> ${data.total_price.toFixed(2)} €</p>
    </div>
  `;
}

</script>
